<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel de Cola — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- ── CONFIGURACIÓN ── Pon aquí la URL de tu Apps Script desplegado ── -->
<script>
  var API_URL = 'https://script.google.com/macros/s/AKfycbwAEmiqAHiNPiyToBFqu7vaXQg7Xe4dnnt42tUnNbJHEhZjshQ6NrPY5CsBUOYVTy-F/exec';
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--rust:#C45C26;--sage:#5A7A50;--sage2:#3D5437;
  --charcoal:#1C1C1A;--cream:#F5F0E8;--ink:#0D0D0B;
  --bg:#F0EDE4;--surface:#FFFFFF;--border:#E0D8C8;
  --ff:'Cormorant Garamond',Georgia,serif;--ffb:'DM Sans',sans-serif;
}
body{font-family:var(--ffb);background:var(--bg);color:var(--charcoal);min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{background:white;border-radius:16px;padding:2.5rem;width:100%;max-width:340px;box-shadow:0 4px 24px rgba(28,28,26,0.1)}
.login-title{font-family:var(--ff);font-size:1.8rem;color:var(--ink);margin-bottom:0.3rem}
.login-sub{font-size:0.82rem;color:#9A9080;margin-bottom:1.5rem}
.field{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1rem}
.field label{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:#9A9080}
.field input{border:1px solid var(--border);border-radius:8px;padding:0.7rem 0.9rem;font-family:var(--ffb);font-size:0.95rem;outline:none}
.field input:focus{border-color:var(--gold)}
.btn{background:var(--charcoal);color:var(--cream);border:none;border-radius:8px;padding:0.85rem;width:100%;font-family:var(--ffb);font-size:0.95rem;cursor:pointer;transition:background 0.2s}
.btn:hover{background:#3A3830}
.btn.gold{background:var(--gold);color:var(--charcoal)}
.btn.gold:hover{background:#D4B060}
.btn.danger{background:none;border:1px solid rgba(196,92,38,0.3);color:var(--rust)}
.btn.danger:hover{background:var(--rust);color:white}
.err-txt{font-size:0.8rem;color:var(--rust);margin-top:0.5rem;min-height:1rem}

/* PANEL */
.panel{display:none;max-width:800px;margin:0 auto;padding:1.5rem}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.8rem}
.panel-title{font-family:var(--ff);font-size:1.8rem;color:var(--ink)}
.header-actions{display:flex;gap:0.6rem;align-items:center}
.refresh-indicator{display:flex;align-items:center;gap:0.4rem;font-size:0.72rem;color:#4A4440}
.dot{width:7px;height:7px;border-radius:50%;background:var(--sage);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}

/* CONFIG */
.config-panel{background:var(--charcoal);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:1.4rem;color:var(--cream)}
.config-title{font-family:var(--ff);font-size:1.2rem;color:var(--gold);margin-bottom:1rem;padding-bottom:0.6rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0.8rem}
.config-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.05);border-radius:8px;padding:0.7rem 0.9rem}
.config-label{font-size:0.82rem;color:#9A9080}
.toggle{padding:0.4rem 0.9rem;border:none;border-radius:6px;font-family:var(--ffb);font-size:0.8rem;font-weight:500;cursor:pointer;min-width:80px;transition:all 0.2s}
.toggle-on{background:var(--sage);color:#fff}
.toggle-off{background:rgba(196,92,38,0.8);color:#fff}
.config-inline{display:flex;align-items:center;gap:0.5rem}
.config-inline input{background:rgba(255,255,255,0.08);border:1px solid #3A3830;border-radius:6px;padding:0.4rem 0.6rem;color:var(--cream);font-family:var(--ffb);font-size:0.85rem;width:80px;outline:none;text-align:center}
.config-inline input:focus{border-color:var(--gold)}
.btn-save{background:var(--gold);color:var(--charcoal);border:none;border-radius:6px;padding:0.4rem 0.7rem;font-family:var(--ffb);font-size:0.78rem;font-weight:500;cursor:pointer}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.7rem;margin-bottom:1.2rem}
.stat{background:var(--surface);border-radius:10px;padding:0.9rem;text-align:center;border:1px solid var(--border)}
.stat-num{font-family:var(--ff);font-size:2rem;font-weight:700;color:var(--charcoal);line-height:1}
.stat-label{font-size:0.7rem;color:#9A9080;margin-top:0.2rem;text-transform:uppercase;letter-spacing:0.08em}

/* ACTIONS */
.actions{display:flex;gap:0.7rem;margin-bottom:1.2rem;flex-wrap:wrap}
.btn-llamar{background:var(--gold);color:var(--charcoal);border:none;border-radius:8px;padding:0.8rem 1.4rem;font-family:var(--ffb);font-size:0.9rem;font-weight:500;cursor:pointer;flex:1;min-width:160px;transition:background 0.2s}
.btn-llamar:hover{background:#D4B060}
.btn-llamar:disabled{opacity:0.4;pointer-events:none}
.btn-reset{background:none;border:1px solid rgba(196,92,38,0.4);color:var(--rust);border-radius:8px;padding:0.8rem 1rem;font-family:var(--ffb);font-size:0.82rem;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn-reset:hover{background:var(--rust);color:#fff;border-color:var(--rust)}

/* TABS */
.queue-tabs{display:flex;gap:0;margin-bottom:1.2rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px}
.queue-tab{flex:1;padding:0.55rem 0.5rem;border:none;background:none;font-family:var(--ffb);font-size:0.8rem;font-weight:500;color:#9A9080;cursor:pointer;border-radius:6px;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.35rem}
.queue-tab.active{background:var(--surface);color:var(--charcoal);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab-count{background:var(--border);color:var(--charcoal);border-radius:10px;padding:0.05rem 0.45rem;font-size:0.7rem;font-weight:600;min-width:18px;text-align:center}
.queue-tab.active .tab-count{background:var(--charcoal);color:#fff}
.tab-count.urgent{background:rgba(196,92,38,0.2);color:var(--rust)}
.queue-tab.active .tab-count.urgent{background:var(--rust);color:#fff}

/* LIST */
.list-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.7rem}
.list-title{font-size:0.72rem;color:#9A9080;letter-spacing:0.12em;text-transform:uppercase}
.timestamp{font-size:0.7rem;color:#B0A890}
.turno-card{background:var(--surface);border-radius:10px;padding:0.9rem 1.1rem;margin-bottom:0.6rem;display:flex;align-items:center;gap:0.9rem;border:1px solid var(--border);transition:opacity 0.2s,transform 0.2s}
.turno-card.llamado{border-color:rgba(201,168,76,0.5);background:rgba(201,168,76,0.05)}
.turno-card.llamado-urgente{border-color:rgba(196,92,38,0.6);background:rgba(196,92,38,0.05)}
.turno-card.fading{opacity:0.4;transform:scale(0.98)}
.turno-num{font-family:var(--ff);font-size:1.8rem;font-weight:700;color:var(--charcoal);min-width:38px;text-align:center;line-height:1}
.turno-info{flex:1;min-width:0}
.turno-nombre{font-size:0.95rem;font-weight:500;color:var(--charcoal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.turno-meta{font-size:0.75rem;color:#9A9080;margin-top:0.15rem;display:flex;gap:0.6rem;flex-wrap:wrap}
.wait-badge{font-size:0.72rem;font-weight:500;padding:0.15rem 0.5rem;border-radius:10px;white-space:nowrap}
.wait-ok{background:rgba(90,122,80,0.12);color:var(--sage)}
.wait-warn{background:rgba(196,92,38,0.12);color:var(--rust)}
.llamado-info{display:flex;align-items:center;gap:0.4rem;font-size:0.72rem;font-weight:500;padding:0.2rem 0.55rem;border-radius:10px;white-space:nowrap}
.llamado-info.reciente{background:rgba(201,168,76,0.15);color:#8B6A20}
.llamado-info.urgente{background:rgba(196,92,38,0.15);color:var(--rust)}
.turno-btns{display:flex;gap:0.45rem;flex-shrink:0}
.btn-sentar{background:var(--sage);color:#fff;border:none;border-radius:6px;padding:0.55rem 0.9rem;font-family:var(--ffb);font-size:0.82rem;font-weight:500;cursor:pointer;transition:background 0.2s;white-space:nowrap}
.btn-sentar:hover{background:var(--sage2)}
.btn-cancelar{background:none;border:1px solid rgba(196,92,38,0.35);color:var(--rust);border-radius:6px;padding:0.55rem 0.6rem;font-family:var(--ffb);font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.btn-cancelar:hover{background:var(--rust);color:#fff;border-color:var(--rust)}
.llamados-section{margin-bottom:1.2rem}
.llamados-label{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--rust);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem}
.llamados-label::after{content:'';flex:1;height:1px;background:rgba(196,92,38,0.2)}
.empty-state{text-align:center;padding:3rem 1rem;color:#B0A890;font-family:var(--ff);font-size:1.2rem;font-style:italic}

/* HISTORIAL */
.hist-card{background:var(--surface);border-radius:8px;padding:0.7rem 0.9rem;margin-bottom:0.45rem;display:flex;align-items:center;gap:0.8rem;border:1px solid var(--border);opacity:0.8}
.hist-card.sentado{border-left:3px solid var(--sage)}
.hist-card.cancelado{border-left:3px solid var(--rust)}
.hist-num{font-family:var(--ff);font-size:1.3rem;font-weight:700;color:#B0A890;min-width:28px}
.hist-info{flex:1;min-width:0}
.hist-nombre{font-size:0.85rem;font-weight:500;color:var(--charcoal)}
.hist-meta{font-size:0.72rem;color:#9A9080;display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.1rem}
.hist-estado{font-size:0.7rem;font-weight:500;padding:0.18rem 0.55rem;border-radius:8px;white-space:nowrap;flex-shrink:0}
.hist-estado.sentado{background:rgba(90,122,80,0.12);color:var(--sage)}
.hist-estado.cancelado{background:rgba(196,92,38,0.12);color:var(--rust)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(13,13,11,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:2rem 1.8rem 1.6rem;max-width:380px;width:100%;transform:scale(0.95);transition:transform 0.25s}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-icon{font-size:2.2rem;margin-bottom:0.8rem}
.modal-title{font-family:var(--ff);font-size:1.5rem;color:var(--charcoal);margin-bottom:0.5rem}
.modal-msg{font-size:0.85rem;color:#6A6560;line-height:1.6;margin-bottom:1.5rem}
.modal-btns{display:flex;gap:0.7rem}
.modal-btn-cancel{flex:1;background:none;border:1px solid var(--border);border-radius:8px;padding:0.75rem;font-family:var(--ffb);font-size:0.88rem;color:var(--charcoal);cursor:pointer;transition:background 0.2s}
.modal-btn-cancel:hover{background:#F5F0F0}
.modal-btn-confirm{flex:1;background:var(--rust);color:#fff;border:none;border-radius:8px;padding:0.75rem;font-family:var(--ffb);font-size:0.88rem;font-weight:500;cursor:pointer;transition:background 0.2s}
.modal-btn-confirm:hover{background:#A84A1E}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-title">Panel del camarero</div>
    <div class="login-sub">Introduce el código del establecimiento para acceder</div>
    <div class="field">
      <label>Código de acceso</label>
      <input type="password" id="login-codigo" placeholder="••••" maxlength="20"
        onkeydown="if(event.key==='Enter') loginPanel()">
    </div>
    <div class="err-txt" id="login-err"></div>
    <button class="btn" onclick="loginPanel()">Entrar</button>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel-main">
  <div class="panel-header">
    <div class="panel-title">Panel de cola</div>
    <div class="header-actions">
      <div class="refresh-indicator"><div class="dot"></div><span id="ts">—</span></div>
    </div>
  </div>

  <div class="config-panel">
    <div class="config-title">Ajustes en vivo</div>
    <div class="config-grid">
      <div class="config-row"><span class="config-label">Estado de la lista</span><button class="toggle" id="btn-cola" onclick="toggleCola()">...</button></div>
      <div class="config-row"><span class="config-label">Pedir código</span><button class="toggle" id="btn-codigo" onclick="toggleCodigo()">...</button></div>
      <div class="config-row" id="row-codigo-val"><span class="config-label">Código actual</span><div class="config-inline"><input type="text" id="inp-codigo"><button class="btn-save" onclick="guardarCodigo()">Guardar</button></div></div>
      <div class="config-row"><span class="config-label">Min. por grupo</span><div class="config-inline"><input type="number" id="inp-minutos" min="1" max="60"><button class="btn-save" onclick="guardarMinutos()">Guardar</button></div></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-espera">–</div><div class="stat-label">En espera</div></div>
    <div class="stat"><div class="stat-num" id="stat-atendidos">–</div><div class="stat-label">Atendidos</div></div>
    <div class="stat"><div class="stat-num" id="stat-cancelados">–</div><div class="stat-label">Cancelados</div></div>
  </div>

  <div class="actions">
    <button class="btn-llamar" id="btn-llamar" onclick="llamarSiguiente()">📣 Llamar siguiente</button>
    <button class="btn-reset" onclick="resetearCola()">🗑 Vaciar cola</button>
  </div>

  <div class="queue-tabs">
    <button class="queue-tab active" id="tab-espera" onclick="switchTab('espera')">En espera <span class="tab-count" id="tab-espera-count">0</span></button>
    <button class="queue-tab" id="tab-llamados" onclick="switchTab('llamados')">Llamados <span class="tab-count urgent" id="tab-llamados-count">0</span></button>
    <button class="queue-tab" id="tab-historial" onclick="switchTab('historial')">Historial <span class="tab-count" id="tab-historial-count">0</span></button>
  </div>

  <div class="list-header">
    <div class="list-title" id="list-title">Cola actual</div>
    <div class="timestamp" id="ts-list">—</div>
  </div>

  <div id="panel-espera">
    <div id="lista-llamados-inline"></div>
    <div id="lista-cola"><div class="empty-state">Cargando...</div></div>
  </div>
  <div id="panel-llamados" style="display:none"><div id="lista-llamados-full"></div></div>
  <div id="panel-historial" style="display:none"><div id="lista-historial"></div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon">🗑</div>
    <div class="modal-title" id="modal-title">Vaciar cola</div>
    <div class="modal-msg" id="modal-msg">¿Seguro que quieres eliminar todos los turnos de hoy?</div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn-confirm" id="modal-confirm-btn" onclick="confirmAction()">Vaciar cola</button>
    </div>
  </div>
</div>

<script>
var configData  = {};
var autoTimer   = null;
var codigoSession = '';
var currentTab  = 'espera';
var _pendingAction = null;

// ── API ───────────────────────────────────────────────────────────────────────
// All calls use GET — Apps Script CORS only works reliably on GET
function api(params) {
  var url = API_URL + '?';
  var parts = [];
  Object.keys(params).forEach(function(k) {
    if (params[k] !== undefined && params[k] !== null) {
      parts.push(k + '=' + encodeURIComponent(params[k]));
    }
  });
  return fetch(url + parts.join('&')).then(function(r){ return r.json(); });
}
function apiGet(action, params) { var p = params||{}; p.action=action; return api(p); }
function apiPost(data) { return api(data); }

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function loginPanel() {
  var codigo = document.getElementById('login-codigo').value.trim();
  if (!codigo) return;
  document.getElementById('login-err').textContent = 'Verificando...';
  // Fetch full config and compare admin_password client-side
  // (admin_password is included in the config response for this purpose)
  apiGet('config_admin', { codigo: codigo }).then(function(res) {
    if (res.ok) {
      codigoSession = codigo;
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('panel-main').style.display = 'block';
      cargarTodo();
      autoTimer = setInterval(cargarTodo, 8000);
    } else {
      document.getElementById('login-err').textContent = 'Codigo incorrecto.';
    }
  }).catch(function() {
    document.getElementById('login-err').textContent = 'Error de conexion.';
  });
}

// ── CARGAR TODO ───────────────────────────────────────────────────────────────
function cargarTodo() {
  apiGet('cola').then(function(data) {
    configData = data.config || {};
    renderConfig();
    renderStats(data.stats || {});
    renderCola(data.cola || []);
    renderLlamados(data.llamados || []);
    renderHistorial(data.historial || []);
    document.getElementById('ts').innerText = data.timestamp || '—';
    document.getElementById('ts-list').innerText = 'Actualizado ' + (data.timestamp || '');
    document.getElementById('tab-historial-count').innerText = (data.historial || []).length;
  });
}

// ── CONFIG ────────────────────────────────────────────────────────────────────
function renderConfig() {
  var cfg = configData;
  var btnCola = document.getElementById('btn-cola');
  btnCola.innerText   = cfg.colaAbierta ? 'ABIERTA' : 'CERRADA';
  btnCola.className   = 'toggle ' + (cfg.colaAbierta ? 'toggle-on' : 'toggle-off');
  var btnCod = document.getElementById('btn-codigo');
  btnCod.innerText  = cfg.pedirCodigo ? 'ACTIVO' : 'NO';
  btnCod.className  = 'toggle ' + (cfg.pedirCodigo ? 'toggle-on' : 'toggle-off');
  document.getElementById('row-codigo-val').style.display = cfg.pedirCodigo ? '' : 'none';
  document.getElementById('inp-codigo').value  = cfg.codigoActual || '';
  document.getElementById('inp-minutos').value = cfg.minPorGrupo  || 5;
}

function toggleCola() {
  var nuevo = configData.colaAbierta ? 'NO' : 'SI';
  document.getElementById('btn-cola').innerText = '...';
  apiGet('config_set', { key: 'cola_abierta', value: nuevo }).then(cargarTodo);
}
function toggleCodigo() {
  var nuevo = configData.pedirCodigo ? 'NO' : 'SI';
  document.getElementById('btn-codigo').innerText = '...';
  apiGet('config_set', { key: 'pedir_codigo', value: nuevo }).then(cargarTodo);
}
function guardarCodigo() {
  var val = document.getElementById('inp-codigo').value.trim();
  if (val) apiGet('config_set', { key: 'codigo_actual', value: val }).then(cargarTodo);
}
function guardarMinutos() {
  var val = Number(document.getElementById('inp-minutos').value);
  if (val > 0) apiGet('config_set', { key: 'min_por_grupo', value: val }).then(cargarTodo);
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(stats) {
  document.getElementById('stat-espera').innerText     = stats.enEspera    || 0;
  document.getElementById('stat-atendidos').innerText  = stats.atendidos   || 0;
  document.getElementById('stat-cancelados').innerText = stats.cancelados  || 0;
  document.getElementById('tab-espera-count').innerText   = stats.enEspera || 0;
  document.getElementById('tab-llamados-count').innerText = stats.llamados || 0;
  document.getElementById('btn-llamar').disabled = ((stats.enEspera || 0) === 0 && (stats.llamados || 0) === 0);
}

// ── COLA ──────────────────────────────────────────────────────────────────────
function renderCola(cola) {
  var div = document.getElementById('lista-cola');
  if (!cola.length) { div.innerHTML = '<div class="empty-state">La cola está vacía</div>'; return; }
  div.innerHTML = cola.map(function(item) {
    return turnoCardHTML(item, false);
  }).join('');
}

function renderLlamados(llamados) {
  var inlineEl = document.getElementById('lista-llamados-inline');
  var fullEl   = document.getElementById('lista-llamados-full');
  if (!llamados.length) {
    inlineEl.innerHTML = '';
    fullEl.innerHTML   = '<div class="empty-state">No hay turnos llamados</div>';
    return;
  }
  var html = '<div class="llamados-section"><div class="llamados-label">Turnos llamados esperando respuesta</div>';
  html += llamados.map(function(item){ return turnoCardHTML(item, true); }).join('');
  html += '</div>';
  inlineEl.innerHTML = html;
  fullEl.innerHTML   = llamados.map(function(item){ return turnoCardHTML(item, true); }).join('');
}

function turnoCardHTML(item, forceLlamado) {
  var esLlamado = (item.estado === 'llamado') || forceLlamado;
  var esUrgente = esLlamado && item.minsLlamado !== null && item.minsLlamado >= 3;
  var cardClass = 'turno-card' + (esUrgente ? ' llamado-urgente' : (esLlamado ? ' llamado' : ''));
  var badge = '';
  if (esLlamado) {
    var llCls = esUrgente ? 'urgente' : 'reciente';
    var llTxt = (item.minsLlamado === null || item.minsLlamado <= 0)
      ? 'Llamado ahora' : 'Llamado hace ' + item.minsLlamado + ' min' + (item.minsLlamado > 1 ? 's' : '');
    badge = '<span class="llamado-info ' + llCls + '">' + (esUrgente ? '⚠️ ' : '📣 ') + llTxt + '</span>';
  } else {
    var wCls = item.minEspera >= 15 ? 'wait-warn' : 'wait-ok';
    badge = '<span class="wait-badge ' + wCls + '">' + item.minEspera + ' min esperando</span>';
  }
  return '<div class="' + cardClass + '" id="card-' + item.id + '">' +
    '<div class="turno-num">' + item.turno + '</div>' +
    '<div class="turno-info">' +
      '<div class="turno-nombre">' + item.nombre + '</div>' +
      '<div class="turno-meta"><span>👥 ' + item.personas + '</span><span>🕐 ' + item.hora + '</span>' + badge + '</div>' +
    '</div>' +
    '<div class="turno-btns">' +
      '<button class="btn-sentar" onclick="actualizarEstado(\'' + item.id + '\',\'sentado\')">Pasar</button>' +
      '<button class="btn-cancelar" onclick="actualizarEstado(\'' + item.id + '\',\'cancelar\')">Saltar</button>' +
    '</div>' +
  '</div>';
}

function renderHistorial(historial) {
  var el = document.getElementById('lista-historial');
  if (!historial.length) { el.innerHTML = '<div class="empty-state">Sin historial todavía</div>'; return; }
  el.innerHTML = historial.slice().sort(function(a,b){ return b.turno - a.turno; }).map(function(item) {
    var esCancel  = item.estado === 'cancelado';
    var estadoTxt = esCancel ? 'Cancelado' : 'Pasado';
    var callInfo  = item.horaLlamada
      ? (esCancel
          ? 'Llamado ' + item.horaLlamada + ' · sin respuesta' + (item.minsLlamado ? ' (' + item.minsLlamado + ' min)' : '')
          : 'Llamado ' + item.horaLlamada + ' · pasó en ' + (item.minsLlamado || '?') + ' min')
      : (esCancel ? 'Cancelado sin llamar' : 'Pasado directamente');
    return '<div class="hist-card ' + item.estado + '">' +
      '<div class="hist-num">' + item.turno + '</div>' +
      '<div class="hist-info">' +
        '<div class="hist-nombre">' + item.nombre + '</div>' +
        '<div class="hist-meta"><span>👥 ' + item.personas + '</span><span>Llegada: ' + item.hora + '</span><span>' + callInfo + '</span></div>' +
      '</div>' +
      '<div class="hist-estado ' + item.estado + '">' + estadoTxt + '</div>' +
    '</div>';
  }).join('');
}

// ── ACCIONES ──────────────────────────────────────────────────────────────────
function actualizarEstado(id, accion) {
  var card = document.getElementById('card-' + id);
  if (card) card.classList.add('fading');
  // Map UI action names to API action names
  var apiAction = accion === 'sentado' ? 'atender' : accion;
  apiGet(apiAction, { id: id }).then(function(res) {
    if (res.ok) cargarTodo();
    else { if (card) card.classList.remove('fading'); alert(res.error || 'Error'); }
  });
}

function llamarSiguiente() {
  var btn = document.getElementById('btn-llamar');
  btn.disabled = true; btn.innerText = 'Llamando...';
  apiGet('llamar', {}).then(function(res) {
    if (res.ok) {
      btn.innerText = '✓ Llamado: ' + res.nombre;
      setTimeout(function() { btn.innerText = '📣 Llamar siguiente'; cargarTodo(); }, 2000);
    } else {
      btn.disabled = false; btn.innerText = '📣 Llamar siguiente';
      alert(res.error || 'No hay nadie en espera.');
    }
  });
}

function resetearCola() {
  showModal('🗑', 'Vaciar la cola', '¿Seguro que quieres eliminar todos los turnos de hoy?', 'Sí, vaciar', function() {
    apiGet('reset', {}).then(function(res) { if (res.ok) cargarTodo(); });
  });
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['espera','llamados','historial'].forEach(function(t) {
    document.getElementById('tab-'   + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
  });
  var titles = { espera: 'Cola actual', llamados: 'Turnos llamados', historial: 'Historial de hoy' };
  document.getElementById('list-title').innerText = titles[tab] || '';
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(icon, title, msg, confirmLabel, action) {
  document.getElementById('modal-icon').innerText        = icon;
  document.getElementById('modal-title').innerText       = title;
  document.getElementById('modal-msg').innerText         = msg;
  document.getElementById('modal-confirm-btn').innerText = confirmLabel;
  _pendingAction = action;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(evt) {
  if (evt && evt.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  _pendingAction = null;
}
function confirmAction() {
  document.getElementById('modal-overlay').classList.remove('open');
  if (_pendingAction) { _pendingAction(); _pendingAction = null; }
}
</script>
